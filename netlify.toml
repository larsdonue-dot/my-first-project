# Конфигурация Netlify

# Build command и directory
[build]
  command = "echo 'No build needed for static site'"
  publish = "."
  functions = "netlify/functions"

# Перенаправление для SPA (если будет нужно)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers для безопасности
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer"

# Кэширование для статических файлов
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.{js,css}"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Форма Netlify
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
